name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: pulse_dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Deploy backend (dev)
        working-directory: apps/backend
        run: bunx wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: pulse_dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        working-directory: apps/frontend
        run: bun run build
        env:
          PUBLIC_API_URL: ${{ secrets.DEV_API_URL }}
          WORKER_URL: ${{ secrets.DEV_WORKER_URL }}

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/frontend/.svelte-kit/cloudflare --project-name=pulsedev --branch=main